openapi: 3.0.3
info:
  title: rebox
  description: |
    **rebox** loads a **public URL** (decoded from the path token), then serves **text** (render + [Defuddle](https://github.com/kepano/defuddle)),
    a **raster image** (viewport or full-page screenshot), or **captions/transcript** when the target is supported (e.g. YouTube).

    ## URL token (`encodedUrl`)

    `encodedUrl` is **Base64URL** (RFC 4648) encoding of the **UTF-8** absolute URL string, **without padding** (`=` stripped).
    Example: `https://example.com/page` → segment like `aHR0cHM6Ly9leGFtcGxlLmNvbS9wYWdl` (illustrative).

    ## Image responses

    `GET .../image` returns **only** the image bytes in the body (`Content-Type: image/png` or `image/webp`). Nothing is stored for the client;
    the file is generated per request (or served from **server** cache). Metadata is carried in **response headers** (see operation).

    ## Caching without one giant response

    Returning **text + image + transcript** in a single JSON blob would be large and awkward for clients.

    Splitting into **`/text`**, **`/image`**, **`/audio`** does **not** require three headless navigations if the server implements a **shared render snapshot**
    keyed by `(decoded URL, normalized render options)`:

    1. First request for that key runs **one** Playwright navigation, then stores (for a short TTL) e.g. final URL, rendered HTML, screenshot bytes, and any transcript fetch result.
    2. Sibling requests (`/text` vs `/image`) **reuse** that snapshot: Defuddle runs on cached HTML; image bytes are streamed from cache.
    3. HTTP **`ETag`** / **`Cache-Control`** (and optionally **`If-None-Match`**) let browsers and CDNs avoid re-downloading **identical** representations when policy allows.

    Transcript-only flows (e.g. YouTube) may skip the browser entirely and use their own cache key.

    **Note:** Authenticated responses are often uncacheable at shared CDNs unless you design a dedicated cache partition; the snapshot cache is primarily **inside** the service.

    ## Libraries (implementation)

    - Text: Playwright + `defuddle/node` + linkedom/JSDOM.
    - YouTube captions: e.g. `youtube-transcript` / `youtube-transcript-api` (ToS + rate limits).
    - Arbitrary audio URLs: STT provider of choice (out of band for many deployments).

    Production: API key / mTLS / IAM. **SSRF** checks on every decoded URL.
  version: 0.2.0

servers:
  - url: https://rebox.example.com
    description: Production

tags:
  - name: health
  - name: rebox

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness
      security: []
      responses:
        '200':
          description: Service process is up
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /ready:
    get:
      tags: [health]
      summary: Readiness (browser warm, dependencies OK)
      security: []
      responses:
        '200':
          description: Ready to accept render jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Not ready (e.g. browser still starting)

  /rebox/{encodedUrl}/text:
    get:
      tags: [rebox]
      summary: Extracted article text (Defuddle) for decoded URL
      operationId: reboxText
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - $ref: '#/components/parameters/WaitUntil'
        - $ref: '#/components/parameters/TimeoutMs'
        - $ref: '#/components/parameters/ViewportWidth'
        - $ref: '#/components/parameters/ViewportHeight'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/UserAgent'
        - name: markdown
          in: query
          schema: { type: boolean, default: true }
        - name: separateMarkdown
          in: query
          schema: { type: boolean, default: false }
        - name: includeRawHtml
          in: query
          schema: { type: boolean, default: false }
        - name: maxRawHtmlChars
          in: query
          schema: { type: integer, minimum: 1 }
        - name: If-None-Match
          in: header
          required: false
          schema: { type: string }
          description: Opaque ETag from a prior response; server may return 304 if unchanged.
      responses:
        '200':
          description: JSON article payload
          headers:
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
              example: private, max-age=60
            X-Rebox-Final-Url:
              schema: { type: string, format: uri }
            X-Rebox-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReboxTextResponse'
        '304':
          description: Not modified (when If-None-Match matches)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '408':
          $ref: '#/components/responses/Timeout'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'

  /rebox/{encodedUrl}/image:
    get:
      tags: [rebox]
      summary: Screenshot bytes only (body is the image)
      description: |
        Response **body** is raw **PNG** or **WebP** bytes. No JSON, no base64, no multipart.

        Use headers for metadata (`X-Rebox-Final-Url`, `X-Rebox-Title`, timings as hints). Clients that need JSON should call `/text` separately;
        the server **may** reuse one navigation via the shared snapshot cache (see API description).
      operationId: reboxImage
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - $ref: '#/components/parameters/WaitUntil'
        - $ref: '#/components/parameters/TimeoutMs'
        - $ref: '#/components/parameters/ViewportWidth'
        - $ref: '#/components/parameters/ViewportHeight'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/UserAgent'
        - name: fullPage
          in: query
          schema: { type: boolean, default: false }
        - name: format
          in: query
          schema:
            type: string
            enum: [png, webp]
            default: png
        - name: maxHeightPx
          in: query
          description: Cap full-page screenshot height (memory guard).
          schema: { type: integer, minimum: 1 }
        - name: quality
          in: query
          description: WebP quality 1–100.
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: If-None-Match
          in: header
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Raw image body
          headers:
            Content-Type:
              schema:
                type: string
                enum: [image/png, image/webp]
            Content-Disposition:
              schema:
                type: string
                example: inline; filename="rebox.png"
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
              example: private, max-age=60
            X-Rebox-Final-Url:
              schema: { type: string, format: uri }
            X-Rebox-Title:
              schema: { type: string }
              description: Best-effort document title (ASCII or UTF-8; avoid broken headers for exotic titles in implementation).
            X-Rebox-Request-Id:
              schema: { type: string }
            X-Rebox-Timing-Navigation-Ms:
              schema: { type: string }
            X-Rebox-Timing-Screenshot-Ms:
              schema: { type: string }
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '304':
          description: Not modified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '408':
          $ref: '#/components/responses/Timeout'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'

  /rebox/{encodedUrl}/audio:
    get:
      tags: [rebox]
      summary: Transcript / captions for media implied by URL
      description: |
        When `encodedUrl` decodes to a **YouTube** watch URL (or you pass a compatible target), return caption segments.
        For arbitrary pages with embedded audio, behavior is **implementation-defined** (may return 404 `TRANSCRIPT_UNAVAILABLE` until supported).

        This path typically **does not** need a browser if captions are fetched via an API library.
      operationId: reboxAudio
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - name: lang
          in: query
          description: Preferred caption language (BCP 47).
          schema: { type: string }
        - name: If-None-Match
          in: header
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Transcript segments
          headers:
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
            X-Rebox-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReboxAudioResponse'
        '304':
          description: Not modified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No transcript available for this URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    EncodedUrl:
      name: encodedUrl
      in: path
      required: true
      description: Base64URL (no padding) of UTF-8 absolute URL.
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]+$'
    WaitUntil:
      name: wait_until
      in: query
      schema:
        type: string
        enum: [load, domcontentloaded, networkidle]
        default: networkidle
    TimeoutMs:
      name: timeout_ms
      in: query
      schema:
        type: integer
        minimum: 1000
        maximum: 120000
        default: 30000
    ViewportWidth:
      name: viewport_w
      in: query
      schema:
        type: integer
        default: 1280
    ViewportHeight:
      name: viewport_h
      in: query
      schema:
        type: integer
        default: 720
    Locale:
      name: locale
      in: query
      schema: { type: string }
    UserAgent:
      name: user_agent
      in: query
      schema: { type: string }

  responses:
    BadRequest:
      description: Invalid token, malformed URL, or SSRF block
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Timeout:
      description: Navigation or overall deadline exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    PayloadTooLarge:
      description: HTML or screenshot exceeds configured limits
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    TooManyRequests:
      description: Concurrency or rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    BadGateway:
      description: Upstream fetch or browser failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

  schemas:
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - INVALID_URL
            - INVALID_ENCODING
            - SSRF_BLOCKED
            - DNS_REBINDING
            - TIMEOUT
            - NAVIGATION_FAILED
            - BODY_TOO_LARGE
            - SCREENSHOT_TOO_LARGE
            - BROWSER_CRASH
            - EXTRACTION_FAILED
            - TRANSCRIPT_UNAVAILABLE
            - TRANSCRIPTION_FAILED
            - RATE_LIMITED
            - UNAUTHORIZED
            - INTERNAL
        message:
          type: string
        requestId:
          type: string
        details:
          type: object
          additionalProperties: true

    ReadyResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ready
        browser:
          type: string
          example: chromium

    ReboxTextResponse:
      type: object
      required: [finalUrl, article, timingsMs]
      properties:
        finalUrl:
          type: string
          format: uri
        article:
          type: object
          properties:
            contentHtml:
              type: string
            contentMarkdown:
              type: string
            description:
              type: string
            author:
              type: string
            site:
              type: string
            domain:
              type: string
            language:
              type: string
            published:
              type: string
            wordCount:
              type: integer
            extractorType:
              type: string
            schemaOrgData:
              type: object
              additionalProperties: true
        rawHtml:
          type: string
        timingsMs:
          type: object
          properties:
            navigation:
              type: number
            defuddle:
              type: number
        requestId:
          type: string

    ReboxAudioResponse:
      type: object
      required: [videoId, segments]
      properties:
        videoId:
          type: string
        title:
          type: string
        language:
          type: string
        segments:
          type: array
          items:
            type: object
            required: [text]
            properties:
              startSec:
                type: number
              durationSec:
                type: number
              text:
                type: string
        timingsMs:
          type: object
          properties:
            fetch:
              type: number
        requestId:
          type: string
