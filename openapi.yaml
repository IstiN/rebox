openapi: 3.0.3
info:
  title: rebox
  description: |
    **rebox** loads a **public URL** as **one path segment** after `/rebox/`: the segment is the full URL encoded with **`encodeURIComponent`**
    (so `https://` → `https%3A%2F%2F`, path slashes stay inside the segment as `%2F`).

    Then **`/text`**, **`/image`**, or **`/audio`** selects the response. Render options stay in the **query string**.

    **Example:**  
    `GET /rebox/https%3A%2F%2Flearn.ai-native.pro%2F/text?timeout_ms=90000`

    Defaults: `wait_until=domcontentloaded`, `timeout_ms=60000`, **`settle_ms`** from env `REBOX_DEFAULT_SETTLE_MS` (default **2000** ms).

    Image body is raw PNG/WebP bytes; optional query `save_as`, `filename_source`, `fullPage`, etc.

    When `REBOX_API_KEYS` is set: send **`X-API-Key`** or **`Authorization: Bearer`** token (also **`Authorization: ApiKey`**). Same routes accept **GET** or **POST**; on POST, optional JSON body overrides query for duplicate keys.

    SSRF checks on every target URL.
  version: 0.4.0

servers:
  - url: /
    description: Current deployment (Try it out uses this host)

tags:
  - name: health
  - name: rebox

security:
  - ApiKeyAuth: []
  - BearerAuth: []

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /ready:
    get:
      tags: [health]
      summary: Readiness
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Not ready

  /rebox/{encodedUrl}/text:
    get:
      tags: [rebox]
      summary: Render URL, extract article + visible plain text
      operationId: reboxText
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - $ref: '#/components/parameters/WaitUntil'
        - $ref: '#/components/parameters/TimeoutMs'
        - $ref: '#/components/parameters/SettleMs'
        - $ref: '#/components/parameters/ViewportWidth'
        - $ref: '#/components/parameters/ViewportHeight'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/UserAgent'
        - name: markdown
          in: query
          schema: { type: boolean, default: true }
        - name: separateMarkdown
          in: query
          schema: { type: boolean, default: false }
        - name: includeRawHtml
          in: query
          schema: { type: boolean, default: false }
        - name: maxRawHtmlChars
          in: query
          schema: { type: integer }
        - name: content_selector
          in: query
          schema: { type: string }
        - name: debug
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: JSON with `visibleText` (DOM) and Defuddle `article`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReboxTextResponse'
        '304':
          description: Not modified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '408':
          $ref: '#/components/responses/Timeout'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'
    post:
      tags: [rebox]
      summary: Same as GET — use POST; options in query and/or JSON body (body wins on duplicate keys)
      operationId: reboxTextPost
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - $ref: '#/components/parameters/WaitUntil'
        - $ref: '#/components/parameters/TimeoutMs'
        - $ref: '#/components/parameters/SettleMs'
        - $ref: '#/components/parameters/ViewportWidth'
        - $ref: '#/components/parameters/ViewportHeight'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/UserAgent'
        - name: markdown
          in: query
          schema: { type: boolean, default: true }
        - name: separateMarkdown
          in: query
          schema: { type: boolean, default: false }
        - name: includeRawHtml
          in: query
          schema: { type: boolean, default: false }
        - name: maxRawHtmlChars
          in: query
          schema: { type: integer }
        - name: content_selector
          in: query
          schema: { type: string }
        - name: debug
          in: query
          schema: { type: boolean, default: false }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Optional fields mirroring query (e.g. timeout_ms, settle_ms)
      responses:
        '200':
          description: JSON with `visibleText` (DOM) and Defuddle `article`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReboxTextResponse'
        '304':
          description: Not modified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '408':
          $ref: '#/components/responses/Timeout'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'

  /rebox/{encodedUrl}/image:
    get:
      tags: [rebox]
      summary: Screenshot only (response body = image bytes)
      operationId: reboxImage
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - $ref: '#/components/parameters/WaitUntil'
        - $ref: '#/components/parameters/TimeoutMs'
        - $ref: '#/components/parameters/SettleMs'
        - $ref: '#/components/parameters/ViewportWidth'
        - $ref: '#/components/parameters/ViewportHeight'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/UserAgent'
        - name: fullPage
          in: query
          description: Full scrollable page screenshot. Pass `false` for viewport-only.
          schema: { type: boolean, default: true }
        - name: format
          in: query
          schema:
            type: string
            enum: [png, webp]
            default: png
        - name: maxHeightPx
          in: query
          schema: { type: integer }
        - name: quality
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: save_as
          in: query
          description: Optional filename stem for Save dialog (extension added automatically).
          schema: { type: string, maxLength: 200 }
        - name: filename_source
          in: query
          description: How to pick the default stem if `save_as` is omitted — `host` (e.g. learn.ai-native.pro) or `title` (slug from page title).
          schema:
            type: string
            enum: [host, title]
            default: host
      responses:
        '200':
          description: Raw image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '304':
          description: Not modified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '408':
          $ref: '#/components/responses/Timeout'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'
    post:
      tags: [rebox]
      summary: Same as GET — raw image bytes; options in query and/or JSON body
      operationId: reboxImagePost
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - $ref: '#/components/parameters/WaitUntil'
        - $ref: '#/components/parameters/TimeoutMs'
        - $ref: '#/components/parameters/SettleMs'
        - $ref: '#/components/parameters/ViewportWidth'
        - $ref: '#/components/parameters/ViewportHeight'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/UserAgent'
        - name: fullPage
          in: query
          description: Full scrollable page screenshot. Pass `false` for viewport-only.
          schema: { type: boolean, default: true }
        - name: format
          in: query
          schema:
            type: string
            enum: [png, webp]
            default: png
        - name: maxHeightPx
          in: query
          schema: { type: integer }
        - name: quality
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: save_as
          in: query
          description: Optional filename stem for Save dialog (extension added automatically).
          schema: { type: string, maxLength: 200 }
        - name: filename_source
          in: query
          description: How to pick the default stem if `save_as` is omitted — `host` (e.g. learn.ai-native.pro) or `title` (slug from page title).
          schema:
            type: string
            enum: [host, title]
            default: host
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Raw image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '304':
          description: Not modified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '408':
          $ref: '#/components/responses/Timeout'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'

  /rebox/{encodedUrl}/audio:
    get:
      tags: [rebox]
      summary: YouTube transcript (non-YouTube URL → 404)
      operationId: reboxAudio
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - name: lang
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Transcript segments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReboxAudioResponse'
        '304':
          description: Not modified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No transcript / not YouTube
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'
    post:
      tags: [rebox]
      summary: Same as GET — YouTube transcript JSON; optional JSON body for lang etc.
      operationId: reboxAudioPost
      parameters:
        - $ref: '#/components/parameters/EncodedUrl'
        - name: lang
          in: query
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Transcript segments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReboxAudioResponse'
        '304':
          description: Not modified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No transcript / not YouTube
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    EncodedUrl:
      name: encodedUrl
      in: path
      required: true
      description: |
        Full target URL as **one** path segment: `encodeURIComponent(url)` in JS (slashes must be `%2F`, not literal `/`).
      schema:
        type: string
    WaitUntil:
      name: wait_until
      in: query
      schema:
        type: string
        enum: [load, domcontentloaded, networkidle]
        default: domcontentloaded
    TimeoutMs:
      name: timeout_ms
      in: query
      schema:
        type: integer
        default: 60000
    SettleMs:
      name: settle_ms
      in: query
      description: Extra ms to wait after navigation (hydration). Overrides `REBOX_DEFAULT_SETTLE_MS` when set.
      schema:
        type: integer
        minimum: 0
        maximum: 30000
    ViewportWidth:
      name: viewport_w
      in: query
      schema:
        type: integer
        default: 1280
    ViewportHeight:
      name: viewport_h
      in: query
      schema:
        type: integer
        default: 720
    Locale:
      name: locale
      in: query
      schema: { type: string }
    UserAgent:
      name: user_agent
      in: query
      schema: { type: string }

  responses:
    BadRequest:
      description: Bad request / SSRF
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Timeout:
      description: Timeout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    PayloadTooLarge:
      description: Too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    TooManyRequests:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    BadGateway:
      description: Upstream / browser error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

  schemas:
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        requestId: { type: string }
        details: { type: object, additionalProperties: true }

    ReadyResponse:
      type: object
      required: [status]
      properties:
        status: { type: string }
        browser: { type: string }

    ReboxTextResponse:
      type: object
      required: [finalUrl, article, visibleText, timingsMs]
      properties:
        status: { type: string, enum: [success] }
        finalUrl: { type: string, format: uri }
        article:
          type: object
          additionalProperties: true
        visibleText:
          type: string
          description: Live DOM innerText (SPA-friendly)
        rawHtml: { type: string }
        timingsMs:
          type: object
          properties:
            navigation: { type: number }
            defuddle: { type: number }
        requestId: { type: string }

    ReboxAudioResponse:
      type: object
      required: [videoId, segments]
      properties:
        videoId: { type: string }
        title: { type: string }
        language: { type: string }
        segments:
          type: array
          items:
            type: object
            properties:
              startSec: { type: number }
              durationSec: { type: number }
              text: { type: string }
        timingsMs: { type: object }
        requestId: { type: string }
