# Publish @rebox.me/rebox using npm Trusted Publishing (OIDC) — no NPM_TOKEN, no OTP.
#
# One-time on npmjs.com: Package → @rebox.me/rebox → Settings → Trusted publishing
#   - Provider: GitHub Actions
#   - Repository: IstiN/rebox (must match package.json "repository.url")
#   - Workflow filename: publish-npm.yml  (exact name, case-sensitive)
#
# Requires: npm CLI ≥ 11.5.1, Node ≥ 22.14 (see https://docs.npmjs.com/trusted-publishers )
#
# Remove repository secret NPM_TOKEN once OIDC works — a leftover token can still
# trigger EOTP if npm prefers it over OIDC.

name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run only'
        required: false
        default: 'false'
        type: boolean
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: npm version for trusted publishing
        run: |
          npm install -g 'npm@^11.5.1'
          node -v && npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package identity
        run: |
          node -e "const p=require('./package.json'); console.log('Publishing', p.name, '@', p.version);"
          test "$(node -e "console.log(require('./package.json').name)")" = "@rebox.me/rebox"

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: npm publish --dry-run --access public

      - name: Publish to npm (OIDC)
        if: |
          (github.event_name == 'release') ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        run: npm publish --access public
