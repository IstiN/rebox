# Required GitHub repository secrets (add in Settings → Secrets and variables → Actions):
#   GCP_SA_KEY        — JSON key for a service account with:
#                       Artifact Registry Writer, Cloud Run Admin, Service Account User
#                       (on the Cloud Run runtime SA if it differs from deployer)
#   GCP_PROJECT_ID    — e.g. ai-native-478811

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: europe-west1
  AR_REPO: rebox-docker
  IMAGE_NAME: rebox
  SERVICE_NAME: rebox

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          REGISTRY="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          TAG_SHA="${REGISTRY}:${GITHUB_SHA}"
          TAG_LATEST="${REGISTRY}:latest"
          docker build -t "$TAG_SHA" -t "$TAG_LATEST" .
          docker push "$TAG_SHA"
          docker push "$TAG_LATEST"

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --project "$PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300 \
            --concurrency 1 \
            --max-instances 1 \
            --port 3000 \
            --set-env-vars NODE_ENV=production,HOST=0.0.0.0
